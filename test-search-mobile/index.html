<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bethesda Listings | @Bethesda</title>

  <!-- Swiper v11.0.5 芒聙聰 matches site version -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11.0.5/swiper-bundle.min.css">
  <script src="https://cdn.jsdelivr.net/npm/swiper@11.0.5/swiper-bundle.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111111;
      --surface:   #1a1a1a;
      --surface2:  #222222;
      --border:    #2e2e2e;
      --gold:      #c9a96e;
      --gold-dim:  #8a6e45;
      --text:      #e8e8e8;
      --text-dim:  #888;
      --radius:    14px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 芒聰聙芒聰聙芒聰聙 Header 芒聰聙芒聰聙芒聰聙 */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17,17,17,0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }
    .site-header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.03em;
    }
    .site-header p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* 芒聰聙芒聰聙芒聰聙 Filter bar 芒聰聙芒聰聙芒聰聙 */
    .filter-bar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #111;
      font-weight: 600;
    }
    .filter-chip:active { opacity: 0.75; }

    /* 芒聰聙芒聰聙芒聰聙 Search row 芒聰聙芒聰聙芒聰聙 */
    .search-row {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }
    .search-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--gold-dim); }
    .search-btn {
      background: var(--gold);
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      cursor: pointer;
    }
    .search-btn:active { opacity: 0.8; }

    /* 芒聰聙芒聰聙芒聰聙 Results count 芒聰聙芒聰聙芒聰聙 */
    .results-header {
      padding: 8px 16px 4px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* 芒聰聙芒聰聙芒聰聙 Listing cards list 芒聰聙芒聰聙芒聰聙 */
    .cards-list {
      padding: 8px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 芒聰聙芒聰聙芒聰聙 Card 芒聰聙芒聰聙芒聰聙 */
    .listing-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    /* 芒聰聙芒聰聙芒聰聙 Photo Swiper 芒聰聙芒聰聙芒聰聙 */
    .photo-swiper {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface2);
      position: relative;
    }
    .photo-swiper .swiper-slide {
      overflow: hidden;
      background: var(--surface2);
    }
    .photo-swiper .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Status badge */
    .status-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
    }
    .status-badge.active   { background: rgba(34,197,94,0.8); color: #fff; }
    .status-badge.pending  { background: rgba(234,179,8,0.85); color: #111; }
    .status-badge.sold     { background: rgba(239,68,68,0.8); color: #fff; }

    /* Photo count badge */
    .photo-count-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Swiper pagination dots 芒聙聰 inside card */
    .photo-swiper .swiper-pagination {
      bottom: 10px;
    }
    .photo-swiper .swiper-pagination-bullet {
      background: rgba(255,255,255,0.55);
      opacity: 1;
      width: 6px;
      height: 6px;
    }
    .photo-swiper .swiper-pagination-bullet-active {
      background: #fff;
      width: 18px;
      border-radius: 3px;
    }

    /* Placeholder when no photo */
    .no-photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--text-dim);
    }
    .no-photo-placeholder svg { opacity: 0.3; }

    /* 芒聰聙芒聰聙芒聰聙 Card details 芒聰聙芒聰聙芒聰聙 */
    .card-details {
      padding: 14px 16px 16px;
    }

    .card-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .card-stats {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      font-size: 14px;
      color: var(--text);
    }
    .card-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-stat-label {
      color: var(--text-dim);
      font-size: 12px;
    }

    .card-address {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.3;
    }
    .card-street {
      color: var(--text);
      font-weight: 500;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .card-listdate {
      font-size: 11px;
      color: var(--text-dim);
    }
    .card-cta {
      background: var(--gold);
      color: #111;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
    }
    .card-cta:active { opacity: 0.8; }

    /* 芒聰聙芒聰聙芒聰聙 Loading / error states 芒聰聙芒聰聙芒聰聙 */
    .state-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      padding: 32px 24px;
      text-align: center;
      color: var(--text-dim);
      gap: 12px;
    }
    .state-block .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-block h3 { color: var(--text); font-size: 17px; }
    .state-block p  { font-size: 14px; line-height: 1.5; }

    /* 芒聰聙芒聰聙芒聰聙 Debug panel 芒聰聙芒聰聙芒聰聙 */
    #debug-panel {
      display: none;
      margin: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 11px;
      font-family: monospace;
      color: #888;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <h1>@Bethesda Listings</h1>
    <p id="header-sub">Browse active homes</p>
  </header>

  <!-- Search + Filter -->
  <div class="search-row">
    <input class="search-input" type="text" id="city-input" placeholder="City (e.g. Bethesda)" value="Bethesda">
    <button class="search-btn" onclick="runSearch()">Search</button>
  </div>

  <div class="filter-bar" id="filter-bar">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</div>
    <div class="filter-chip" data-filter="2" onclick="setFilter('2', this)">2+ Beds</div>
    <div class="filter-chip" data-filter="3" onclick="setFilter('3', this)">3+ Beds</div>
    <div class="filter-chip" data-filter="4" onclick="setFilter('4', this)">4+ Beds</div>
    <div class="filter-chip" data-filter="u1m" onclick="setFilter('u1m', this)">Under $1M</div>
    <div class="filter-chip" data-filter="1-2m" onclick="setFilter('1-2m', this)">$1M芒聙聯$2M</div>
    <div class="filter-chip" data-filter="o2m" onclick="setFilter('o2m', this)">$2M+</div>
  </div>

  <!-- Results -->
  <div id="results-header" class="results-header" style="display:none;"></div>
  <div id="cards-list" class="cards-list"></div>

  <!-- Debug (tap footer 5x to show) -->
  <div id="debug-panel"></div>

  <script>
  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  //  State
  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  let allListings = [];
  let activeFilters = { beds: null, priceRange: null };
  let tapCount = 0;

  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  //  Boot
  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  document.addEventListener('DOMContentLoaded', () => {
    runSearch();
    // Secret debug tap (tap header 5x)
    document.querySelector('.site-header').addEventListener('click', () => {
      tapCount++;
      if (tapCount >= 5) { tapCount = 0; toggleDebug(); }
    });
  });

  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  //  Search
  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  async function runSearch() {
    showLoading();
    const city     = document.getElementById('city-input').value.trim() || 'Bethesda';
    const minBeds  = activeFilters.beds || '1';
    const { minPrice, maxPrice } = getPriceRange();

    const params = new URLSearchParams({
      city, minBeds, minPrice, maxPrice, limit: '20'
    });

    try {
      const resp = await fetch(`/idx-search?${params}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      if (data.error === 'no_api_key') {
        showError('API key not configured', 'Set IDX_API_KEY in Cloudflare Pages environment variables.');
        return;
      }

      allListings = data.listings || [];
      renderListings(allListings);
      updateDebug(data);
    } catch (err) {
      showError('Could not load listings', err.message);
    }
  }

  function getPriceRange() {
    switch (activeFilters.priceRange) {
      case 'u1m':  return { minPrice: '0',       maxPrice: '999999' };
      case '1-2m': return { minPrice: '1000000', maxPrice: '1999999' };
      case 'o2m':  return { minPrice: '2000000', maxPrice: '10000000' };
      default:     return { minPrice: '200000',  maxPrice: '10000000' };
    }
  }

  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  //  Filters
  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function setFilter(val, el) {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    // Reset both filters, then apply the selected one
    activeFilters.beds = null;
    activeFilters.priceRange = null;

    if (['2','3','4'].includes(val))        activeFilters.beds       = val;
    if (['u1m','1-2m','o2m'].includes(val)) activeFilters.priceRange = val;

    runSearch();
  }

  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  //  Render
  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function renderListings(listings) {
    const list    = document.getElementById('cards-list');
    const header  = document.getElementById('results-header');
    const sub     = document.getElementById('header-sub');
    const city    = document.getElementById('city-input').value.trim() || 'Bethesda';

    if (!listings || listings.length === 0) {
      list.innerHTML = '';
      header.style.display = 'none';
      showError('No listings found', `Try adjusting your filters or searching a different city.`);
      return;
    }

    header.style.display = 'block';
    header.textContent   = `${listings.length} listing${listings.length !== 1 ? 's' : ''} 脗路 ${city}`;
    sub.textContent      = `${listings.length} active homes`;

    list.innerHTML = listings.map((l, i) => cardHTML(l, i)).join('');

    // Init Swipers
    listings.forEach((l, i) => {
      if (l.photos && l.photos.length > 1) {
        new Swiper(`#swiper-${i}`, {
          loop: l.photos.length > 2,
          pagination: { el: `#swiper-${i} .swiper-pagination`, clickable: true },
          preloadImages: false,
          lazy: { loadPrevNext: true },
          grabCursor: true,
          threshold: 10,
        });
      }
    });
  }

  function cardHTML(l, idx) {
    const photos   = l.photos && l.photos.length > 0 ? l.photos : [];
    const hasPhoto = photos.length > 0;
    const multi    = photos.length > 1;

    const statusClass = {
      'Active':               'active',
      'Active UnderContract':  'pending',
      'Pending':               'pending',
      'Sold':                  'sold',
      'ACTIVE':                'active',
      'ACTIVE UNDER CONTRACT': 'pending',
      'PENDING':               'pending',
      'SOLD':                  'sold',
    }[l.status] || 'active';

    const sqft     = l.sqft     ? `<span class="card-stat"><strong>${parseInt(l.sqft).toLocaleString()}</strong><span class="card-stat-label"> sqft</span></span>` : '';
    const listDate = l.listDate ? `Listed ${formatDate(l.listDate)}` : '';
    const address  = [l.street, `${l.city}, ${l.state} ${l.zip}`].filter(Boolean).join('<br>');

    const detailHref = l.detailsURL || '#';

    // Photo area
    let photoArea;
    if (!hasPhoto) {
      photoArea = `
        <div class="photo-swiper" style="display:flex;align-items:center;justify-content:center;">
          <div class="no-photo-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span style="font-size:12px;">Photo unavailable</span>
          </div>
        </div>`;
    } else if (!multi) {
      // Single photo 芒聙聰 no Swiper overhead
      photoArea = `
        <div class="photo-swiper" style="position:relative;">
          <span class="status-badge ${statusClass}">${l.status || 'Active'}</span>
          <img src="${photos[0]}" alt="${l.street || 'Listing photo'}"
               loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>`;
    } else {
      // Multi-photo Swiper
      const slides = photos.map(url => `
        <div class="swiper-slide">
          <img src="${url}" alt="${l.street || 'Listing photo'}" loading="lazy">
        </div>`).join('');

      photoArea = `
        <div class="photo-swiper swiper" id="swiper-${idx}">
          <span class="status-badge ${statusClass}">${l.status || 'Active'}</span>
          <span class="photo-count-badge">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            ${photos.length}
          </span>
          <div class="swiper-wrapper">${slides}</div>
          <div class="swiper-pagination"></div>
        </div>`;
    }

    return `
      <div class="listing-card" data-id="${l.id}">
        ${photoArea}
        <div class="card-details">
          <div class="card-price">${l.priceStr}</div>
          <div class="card-stats">
            <span class="card-stat"><strong>${l.beds}</strong><span class="card-stat-label"> bd</span></span>
            <span class="card-stat"><strong>${l.baths}</strong><span class="card-stat-label"> ba</span></span>
            ${sqft}
          </div>
          <div class="card-address">
            <span class="card-street">${l.street || '芒聙聯'}</span><br>
            ${l.city}, ${l.state} ${l.zip}
          </div>
          <div class="card-footer">
            <span class="card-listdate">${listDate}</span>
            <a class="card-cta" href="${detailHref}" target="_blank">Details 芒聠聮</a>
          </div>
        </div>
      </div>`;
  }

  // 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

  function showLoading() {

  function showError(title, msg) {
    document.getElementById('cards-list').innerHTML = `
      <div class="state-block">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch { return dateStr; }
  }

  function updateDebug(data) {
    const panel = document.getElementById('debug-panel');
    const sample = data.listings && data.listings[0];
    panel.textContent = `
COUNT: ${data.count || 0}
ERROR: ${data.error || 'none'}

FIRST LISTING RAW FIELDS: ${sample ? JSON.stringify(sample.rawFields) : 'n/a'}

FIRST LISTING PHOTOS (${sample ? (sample.photos || []).length : 0}):
${sample ? (sample.photos || []).join('\n') : 'n/a'}

FIRST LISTING DATA:
${sample ? JSON.stringify({ ...sample, rawFields: undefined, photos: undefined }, null, 2) : 'n/a'}
    `.trim();
  }

  function toggleDebug() {
    const p = document.getElementById('debug-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }
