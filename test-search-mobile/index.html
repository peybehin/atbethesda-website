<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Search Results — @Bethesda</title>
<style>
  :root{--red:#d60717;--red-dark:#a00511;--ink:#1a1a1a;--muted:#6f6f76;--line:#e3e3e3;
        --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:#fff}
  .top{background:#000;color:#fff;padding:18px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-weight:800;letter-spacing:2px;font-size:20px}.logo b{color:var(--red)}
  .burger{display:flex;flex-direction:column;gap:5px}.burger span{display:block;width:24px;height:2px;background:#fff;border-radius:2px}
  .searchwrap{background:#fff;padding:16px 16px 10px;border-bottom:1px solid var(--line)}
  .sbox{display:flex;align-items:center;border:1px solid #cfcfcf;border-radius:999px;padding:11px 16px;color:#999;font-size:15px;margin-bottom:12px}
  .pills{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:12px}
  .pill{border:1px solid #cfcfcf;border-radius:999px;padding:9px 15px;font-size:13px;font-weight:700}
  .acts{display:flex;gap:10px}.acts .seg{display:flex;border:1px solid #cfcfcf;border-radius:999px;overflow:hidden}
  .acts .seg span{padding:9px 18px;font-size:13px;font-weight:800}.acts .seg span.on{background:var(--red);color:#fff}
  .acts .save{background:var(--red);color:#fff;border:0;border-radius:999px;padding:9px 20px;font-size:13px;font-weight:800}
  .countbar{background:#f1f1f3;padding:14px 16px;font-weight:800;font-size:14px;color:#333}
  .results{padding:14px 16px 30px}
  .state{padding:40px 16px;text-align:center;color:#888;font-size:14px}
  .card{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .gal{position:relative}
  .gal__track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .gal__track::-webkit-scrollbar{display:none}
  .gal__slide{flex:0 0 100%;scroll-snap-align:center;height:230px;background:#e6e6ea}
  .gal__slide img{width:100%;height:100%;object-fit:cover;display:block}
  .gal__status{position:absolute;left:12px;top:12px;background:var(--red);color:#fff;font-size:11px;font-weight:800;letter-spacing:.04em;padding:4px 10px;border-radius:4px}
  .gal__count{position:absolute;right:12px;top:12px;background:rgba(0,0,0,.62);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .gal__dots{position:absolute;left:0;right:0;bottom:9px;display:flex;justify-content:center;gap:5px;pointer-events:none;flex-wrap:wrap;padding:0 20px}
  .gal__dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55);box-shadow:0 0 2px rgba(0,0,0,.5);transition:transform .2s,background .2s}
  .gal__dots i.on{background:#fff;transform:scale(1.3)}
  .gal__heart{position:absolute;right:12px;bottom:9px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:16px;color:#888}
  .body{padding:14px}
  .price{font-size:22px;font-weight:800}
  .addr{color:#555;font-size:14px;margin:4px 0 8px}
  .meta{color:#444;font-size:13px;display:flex;gap:14px;margin-bottom:12px}
  .vbtn{display:block;text-align:center;border:1px solid var(--ink);border-radius:8px;padding:11px;font-weight:800;font-size:13px;text-decoration:none;color:var(--ink)}
  .foot{background:#000;color:#999;text-align:center;font-size:12px;padding:26px 16px}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin:2px 0 12px}
</style>
</head>
<body>
  <div class="top"><div class="logo">@<b>BETHESDA</b></div><div class="burger"><span></span><span></span><span></span></div></div>
  <div class="searchwrap">
    <div class="sbox">&#128269; City, neighborhood, or ZIP code&hellip;</div>
    <div class="pills"><span class="pill">ANY PRICE &#9662;</span><span class="pill">BEDS &#9662;</span><span class="pill">BATHS &#9662;</span><span class="pill">ALL TYPES &#9662;</span></div>
    <div class="acts"><div class="seg"><span class="on">LIST</span><span>MAP</span></div><button class="save">SAVE SEARCH</button></div>
  </div>
  <div class="countbar" id="countbar">Loading listings&hellip;</div>
  <div class="hint">&larr; swipe the photos &rarr;</div>
  <div class="results" id="results"><div class="state">Loading real listings&hellip;</div></div>
  <div class="foot">Your hyperlocal Bethesda &amp; DC Metro real estate expert.<br>Data services provided by IDX Broker</div>
<script>
  var MAXPHOTOS=12;
  function esc(s){return (s||'').toString().replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function cardHTML(l,idx){
    var photos=(l.photos||[]).slice(0,MAXPHOTOS);
    if(photos.length===0)photos=[''];
    var slides=photos.map(function(src,i){
      var first=i===0;
      var imgAttr=first?('src="'+esc(src)+'" loading="eager"'):('data-src="'+esc(src)+'" loading="lazy"');
      return '<div class="gal__slide"><img '+imgAttr+' alt=""></div>';
    }).join('');
    var dots=photos.map(function(_,i){return '<i'+(i===0?' class="on"':'')+'></i>';}).join('');
    var addr=[l.street,(l.unit?('#'+l.unit):''),l.city,l.state,l.zip].filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
    var meta=[(l.beds&&l.beds!=='-'?l.beds+' bd':''),(l.baths&&l.baths!=='-'?l.baths+' ba':''),(l.sqft?Number(l.sqft).toLocaleString()+' sqft':'')].filter(Boolean).join(' · ');
    var status=(l.status||'ACTIVE').replace(/_/g,' ');
    var href=l.detailsURL||'#';
    return '<div class="card"><a href="'+esc(href)+'" style="text-decoration:none;color:inherit;"><div class="gal" data-idx="'+idx+'">'+
      '<div class="gal__track" id="trk'+idx+'">'+slides+'</div>'+
      '<span class="gal__status">'+esc(status)+'</span>'+
      '<span class="gal__count" id="cnt'+idx+'">1 / '+photos.length+'</span>'+
      '<div class="gal__heart">&#9825;</div>'+
      '<div class="gal__dots" id="dots'+idx+'">'+dots+'</div></div></a>'+
      '<div class="body"><div class="price">'+esc(l.priceStr||('$'+(l.price||'')))+'</div>'+
      '<div class="addr">'+esc(addr)+'</div><div class="meta"><span>'+esc(meta)+'</span></div>'+
      '<a class="vbtn" href="'+esc(href)+'">View Details</a></div></div>';
  }
  function wireGallery(idx,total){
    var trk=document.getElementById('trk'+idx);if(!trk)return;
    var dots=document.getElementById('dots'+idx).children;var cnt=document.getElementById('cnt'+idx);var raf;
    trk.addEventListener('scroll',function(){
      if(raf)return;raf=requestAnimationFrame(function(){raf=0;
        var i=Math.round(trk.scrollLeft/trk.clientWidth);if(i<0)i=0;if(i>total-1)i=total-1;
        [i,i+1].forEach(function(k){var im=trk.children[k]&&trk.children[k].firstChild;if(im&&!im.src&&im.getAttribute('data-src')){im.src=im.getAttribute('data-src');}});
        cnt.textContent=(i+1)+' / '+total;
        for(var d=0;d<dots.length;d++)dots[d].className=(d===i?'on':'');
      });
    },{passive:true});
  }
  fetch('/idx-search?city=Bethesda&limit=50').then(function(r){return r.json();}).then(function(data){
    var listings=data.listings||[];
    var cb=document.getElementById('countbar');var res=document.getElementById('results');
    if(data.error||listings.length===0){cb.textContent='No listings';res.innerHTML='<div class="state">No listings returned'+(data.error?(' ('+esc(data.error)+')'):'')+'.</div>';return;}
    cb.textContent=listings.length+' FEATURED LISTING'+(listings.length!==1?'S':'');
    res.innerHTML=listings.map(cardHTML).join('');
    listings.forEach(function(l,i){wireGallery(i,Math.min((l.photos||['']).length,MAXPHOTOS)||1);});
  }).catch(function(e){document.getElementById('results').innerHTML='<div class="state">Could not load listings.</div>';});
</script>
</body>
</html>
